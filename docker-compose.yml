version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: tracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${PASSWORD}
      MYSQL_DATABASE: ${DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build: ./ml-service
    container_name: tracker-ml
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build: ./chat-service
    container_name: tracker-chat
    ports:
      - "5001:5001"
    environment:
      SPRING_API_URL: ${SPRING_API_URL}
      OLLAMA_HOST: ${OLLAMA_HOST}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tracker-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${URL}
      SPRING_DATASOURCE_USERNAME: ${USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${PASSWORD}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://chat-service:5001}
    depends_on:
      mysql:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data: